<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #8c1003;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 1200px;
            background: #a32e18;
            border-radius: 20px;
            box-shadow: 30px 30px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #f6a040;
            font-size: 50px;
            line-height: 1.2;
            margin: 0 0 20px;
        }
        pre {
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 10px;
            color: #2c3e50;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.1);
        }
        button {
            background: linear-gradient(to right, #f6a040, #e37615);
            color: white;
            font-size: 18px;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 20px;
        }
        button:hover {
            background: linear-gradient(to right, #c1b54d, #938f2d);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recipe for {{ label }}</h1>
        <pre>{{ recipe }}</pre>
        <button onclick="window.history.back()">Go Back</button>
    </div>
</body>
</html>
