<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Recognition</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('/static/images/background.jpeg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        .container {
            width: 650px;
            height: 450px;
            background: #8c1003;
            border-radius: 20px;
            box-shadow: 30px 30px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin-left: 40px;
            text-align: center;
        }
        h1 {
            color: #f6a040;
            font-size: 45px;
            margin-bottom: 10px;
        }
        p {
            color: #f6a040;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .file-input {
            display: block;
            margin: 20px auto;
            font-size: 16px;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 10px;
            background-color: #ecf0f1;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
        }
        button {
            background: linear-gradient(to right, #f6a040, #e37615);
            color: white;
            font-size: 18px;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: linear-gradient(to right, #c1b54d, #938f2d);
        }
        .result {
            
            margin-top: 20px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.1);
            color: #2c3e50;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Foodify🍴</h1>
        <p>Upload an image of food, and the app will predict its label and provide a recipe.</p>
        <form id="upload-form">
            <input type="file" name="file" accept="image/*" class="file-input" required>
            <button type="submit">Upload and Predict</button>
        </form>
        <div class="result" id="result"></div>
    </div>
    <script>
        const form = document.getElementById('upload-form');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            resultDiv.innerHTML = 'Processing... ⏳';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('Server Response:', data);

                if (data.error) {
                    resultDiv.innerHTML = `<p class="error">Error: ${data.error}</p>`;
                } else {
                    const predictedLabel = data.predicted_label;
                    resultDiv.innerHTML = `
                        <h3>Predicted Label: ${predictedLabel}</h3>
                        <button id="view-recipe-button">View Recipe</button>
                    `;

                    const viewRecipeButton = document.getElementById('view-recipe-button');
                    viewRecipeButton.addEventListener('click', () => {
                        // Redirect to the recipe page with the predicted label
                        window.location.href = `/recipe?label=${encodeURIComponent(predictedLabel)}`;
                    });
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">An error occurred: ${err.message}</p>`;
            }
        });
    </script>
</body>
</html>
